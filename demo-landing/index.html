<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyStree Soul — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #2d1b2e 0%, #0d0d0d 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 20px;
      gap: 32px;
    }

    .header { text-align: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(196,154,108,0.12);
      border: 1px solid rgba(196,154,108,0.3);
      color: #c49a6c;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 16px;
    }
    .dot {
      width: 6px; height: 6px;
      background: #c49a6c;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(0.6); }
    }
    h1 {
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .sub {
      margin-top: 8px;
      font-size: clamp(13px, 2vw, 16px);
      color: #6b5b6b;
    }

    /* Phone */
    .phone {
      position: relative;
      width: min(320px, 85vw);
      aspect-ratio: 320 / 680;
      flex-shrink: 0;
    }
    .shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #2c2c2e, #1c1c1e);
      border-radius: 15.5%;
      box-shadow:
        0 0 0 1.5px #3a3a3c,
        0 0 0 4px #1c1c1e,
        0 40px 100px rgba(0,0,0,0.95),
        inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 3.8%;
      position: relative;
    }
    .island {
      position: absolute;
      top: 3.8%;
      left: 50%;
      transform: translateX(-50%);
      width: 29%;
      height: 4.2%;
      background: #000;
      border-radius: 99px;
      z-index: 10;
    }
    .btn { position: absolute; background: #2c2c2e; border-radius: 3px; }
    .pwr  { right:-1.8%; top:24%; width:1.8%; height:10%; }
    .vup  { left:-1.8%;  top:19%; width:1.8%; height:7%; }
    .vdn  { left:-1.8%;  top:29%; width:1.8%; height:9%; }
    .sil  { left:-1.8%;  top:13%; width:1.8%; height:3.5%; }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 12.5%;
      overflow: hidden;
      background: #000;
      position: relative;
    }
    .screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #120a12;
      gap: 14px;
      z-index: 5;
      transition: opacity 0.6s ease;
      border-radius: 12.5%;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .lname {
      font-size: 20px;
      font-weight: 700;
      color: #c49a6c;
      letter-spacing: -0.5px;
      font-family: Georgia, serif;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid #2a2a2a;
      border-top-color: #c49a6c;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ltxt { font-size: 11px; color: #4a3a4a; letter-spacing: 0.5px; }

    /* Store buttons */
    .stores {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .stores-label {
      font-size: 10px;
      color: #3a2a3a;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .store-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .sbtn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: #4a4a4a;
      font-size: 12px;
      padding: 9px 18px;
      border-radius: 10px;
      text-decoration: none;
      opacity: 0.5;
      cursor: default;
    }

    /* Responsive — on mobile show app directly */
    @media (max-width: 480px) {
      body { padding: 20px 10px; gap: 20px; }
      .phone { width: min(300px, 92vw); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge"><span class="dot"></span>Live Interactive Demo</div>
    <h1>MyStree Soul</h1>
    <p class="sub">Your personal women's wellness companion</p>
  </div>

  <div class="phone">
    <div class="shell">
      <div class="island"></div>
      <div class="btn pwr"></div>
      <div class="btn vup"></div>
      <div class="btn vdn"></div>
      <div class="btn sil"></div>
      <div class="screen">
        <div class="loader" id="loader">
          <div class="lname">MyStree Soul</div>
          <div class="spinner"></div>
          <div class="ltxt">Starting your experience...</div>
        </div>
        <iframe
          id="frame"
          src="https://mystreesoulappwebsite.onrender.com"
          title="MyStree Soul Live Demo"
          allow="camera; microphone; geolocation; clipboard-write"
        ></iframe>
      </div>
    </div>
  </div>

  <div class="stores">
    <div class="stores-label">Coming soon to</div>
    <div class="store-row">
      <span class="sbtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        App Store
      </span>
      <span class="sbtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.18 23.76c.35.19.75.19 1.09 0l11.37-6.52-2.4-2.41-10.06 8.93zm14.83-8.51L5.47 8.74 3.18.24C2.84.05 2.44.05 2.1.24L2 .3v23.4l.1.06 13.54-7.76 2.37-1.36v-.39zm-2.36-6.44L3.18.28l10.06 8.93 2.41-2.4zm2.36 5.04l-2.37-1.36.01-.01 2.36-1.35c.34.2.34.52 0 .72z"/>
        </svg>
        Google Play
      </span>
    </div>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const loader = document.getElementById('loader');
    frame.addEventListener('load', () => loader.classList.add('hidden'));
    setTimeout(() => loader.classList.add('hidden'), 12000);
  </script>

</body>
</html>
